<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cf-drop</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <main class="popup">
    <section id="setupNotice" class="panel hidden">
      <p class="hint">未配置实例，请先在设置页填写你的 Worker 地址和密码。</p>
      <div class="setup-actions">
        <button id="goSetupBtn" class="btn btn-primary" type="button">前往配置</button>
      </div>
    </section>

    <section id="mainPanel" class="main-panel hidden">
      <iframe id="appFrame" class="app-frame" src="about:blank" title="cf-drop mobile view"></iframe>
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script src="./popup.js"></script>
</body>
</html>
